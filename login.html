<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCar - Giriş Yap</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
 
  <div class="login-container">
 
    <!-- SOL TARAF -->
    <div class="login-left">
      <div class="login-left-overlay"></div>
 
      <div class="login-left-content">
        <a href="index.html" class="logo">
        <img src="image/logo.png" alt="logo">
          <span>Rentiva</span>
         </a>
        <div class="login-left-text">
          <h1>Yola çıkmaya <br> <span>hazır mısın?</span></h1>
          <p>En iyi araçlar, en uygun fiyatlarla. <br> Güvenli, konforlu ve keyifli bir sürüş seni bekliyor.</p>
        </div>
 
        <div class="login-left-footer">
          <span>🛡️</span>
          <div>
            <strong>Güvenliğin bizimle güvende.</strong>
            <p>7/24 destek hizmeti</p>
          </div>
        </div>
      </div>
    </div>
 
    <!-- SAĞ TARAF -->
    <div class="login-right">
      <div class="login-card">
        <h2>Tekrar hoş geldin!</h2>
        <p class="login-subtitle">Hesabına giriş yaparak devam et.</p>
 
        <!-- SEKMELER -->
        <div class="login-tabs">
          <button class="tab active" onclick="switchTab(this, 'kullanici')">
            👤 Kullanıcı Girişi
          </button>
          <button class="tab" onclick="switchTab(this, 'yonetici')">
            🛡️ Yönetici Girişi
          </button>
        </div>
 
        <!-- FORM -->
        <div class="login-form">
          <div class="input-group">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" placeholder="E-posta adresiniz">
          </div>
 
          <div class="input-group">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="Şifreniz">
            <span class="input-eye" onclick="togglePassword()">👁️</span>
          </div>
 
          <div class="login-options">
            <label class="remember-me">
              <input type="checkbox" id="remember">
              <span>Beni hatırla</span>
            </label>
            <a href="#" class="forgot-password">Şifremi unuttum?</a>
          </div>
 
          <button class="btn-login" onclick="handleLogin()">
            Giriş Yap 
          </button>
 
          <div class="divider"><span>veya</span></div>
 
          <button class="btn-social google">
            <img src="https://www.google.com/favicon.ico" alt="Google" width="18">
            Google ile giriş yap
          </button>
 
          <button class="btn-social apple">
             Apple ile giriş yap
          </button>
 
          <p class="register-link">Hesabın yok mu? <a href="register.html">Kayıt ol</a></p>
        </div>
 
      </div>
    </div>
 
  </div>
 
  <script src="js/login.js"></script>
</body>
</html>
